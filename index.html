<script>
function startAnimation() {
  document.querySelector('.enter-btn').style.display = 'none';
  document.getElementById('glow').classList.add('show');
  setTimeout(() => {
    document.getElementById('door-left').classList.add('open');

function initGalaxy() {
  const canvas = document.getElementById('galaxy-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#000008';
  ctx.fillRect(0, 0, W, H);
  const band = ctx.createLinearGradient(0, H*0.3, W, H*0.7);
  band.addColorStop(0, 'rgba(60,40,20,0)');
  band.addColorStop(0.3, 'rgba(120,90,50,0.15)');
  band.addColorStop(0.5, 'rgba(180,140,80,0.25)');
  band.addColorStop(0.7, 'rgba(120,90,50,0.15)');
  band.addColorStop(1, 'rgba(60,40,20,0)');
  ctx.fillStyle = band;
  ctx.fillRect(0, 0, W, H);
  function drawNebula(x, y, r, color) {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, color);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(x-r, y-r, r*2, r*2);
  }
  drawNebula(W*0.2, H*0.3, 120, 'rgba(80,40,140,0.12)');
  drawNebula(W*0.7, H*0.6, 150, 'rgba(40,60,140,0.1)');
  drawNebula(W*0.5, H*0.5, 200, 'rgba(100,60,20,0.08)');
  drawNebula(W*0.8, H*0.2, 100, 'rgba(60,80,160,0.1)');
  for (let i = 0; i < 800; i++) {
    const x = Math.random()*W, y = Math.random()*H;
    const r = Math.random()*1.5;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${0.3+Math.random()*0.7})`;
    ctx.fill();
  }
  for (let i = 0; i < 400; i++) {
    const x = Math.random()*W, y = H*0.3+Math.random()*H*0.4;
    ctx.beginPath();
    ctx.arc(x, y, Math.random()*0.8, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,240,200,${Math.random()*0.6})`;
    ctx.fill();
  }
}

function shootingStar() {

  const star = document.createElement('div');
  const startX = Math.random()*window.innerWidth;
  const startY = Math.random()*window.innerHeight*0.5;
  star.style.cssText = `position:absolute;left:${startX}px;top:${startY}px;width:120px;height:2px;background:linear-gradient(to right,transparent,white);border-radius:2px;transform:rotate(${20+Math.random()*30}deg);opacity:1;transition:all 0.8s ease-out;pointer-events:none;`;
  overlay.appendChild(star);
  setTimeout(() => { star.style.opacity='0'; star.style.transform=`translateX(150px) translateY(80px) rotate(${20+Math.random()*30}deg)`; }, 50);
  setTimeout(() => star.remove(), 900);
}

const planets = [
  { name:'Pizza',       size:68, color:['#FF8C00','#FF4500','#FFD700'], glow:'#FF8C00', angle:270, dist:0.18 },
  { name:'Burger',      size:58, color:['#CC0000','#8B0000','#FF4444'], glow:'#CC0000', angle:330, dist:0.24 },
  { name:'Pasta',       size:50, color:['#DAA520','#B8860B','#FFD700'], glow:'#DAA520', angle:30,  dist:0.30 },
  { name:'Mexican',     size:44, color:['#228B22','#006400','#32CD32'], glow:'#228B22', angle:90,  dist:0.34 },
  { name:'Milkshake',   size:38, color:['#00BFFF','#0080FF','#87CEEB'], glow:'#00BFFF', angle:150, dist:0.38 },
  { name:'Thick Shake', size:32, color:['#6A0DAD','#4B0082','#9B59B6'], glow:'#9B59B6', angle:210, dist:0.42 },
  { name:'Cafe Special',size:26, color:['#FF69B4','#FF1493','#FFB6C1'], glow:'#FF69B4', angle:240, dist:0.46 },
];

function initPlanets() {
  const solar = document.getElementById('solar-system');
  const cx = window.innerWidth/2;
  const cy = window.innerHeight/2;
  const base = Math.min(window.innerWidth, window.innerHeight);
  planets.forEach((p, i) => {
    const rad = (p.angle*Math.PI)/180;
    const dist = base*p.dist;
    const x = cx+Math.cos(rad)*dist;
    const y = cy+Math.sin(rad)*dist;
    const el = document.createElement('div');
    el.className = 'planet';
    el.style.cssText = `width:${p.size}px;height:${p.size}px;left:${x}px;top:${y}px;background:radial-gradient(circle at 35% 30%,${p.color[0]},${p.color[1]},${p.color[2]});box-shadow:0 0 ${p.size*0.4}px ${p.glow},0 0 ${p.size*0.8}px ${p.glow}44;font-size:${Math.max(10,p.size*0.22)}px;animation-delay:${i*0.4}s;`;
    el.textContent = p.name;
    solar.appendChild(el);
    const label = document.createElement('div');
    label.className = 'planet-label';
    label.style.cssText = `left:${x}px;top:${y+p.size/2+8}px;`;
    label.textContent = p.name;
    solar.appendChild(label);
  });
}
</script>
