Got it. Here's the complete clean code — just the door animation, nothing else after:

```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MenuAR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; overflow: hidden; width: 100vw; height: 100vh; }

    #door-scene {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .bg-image {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .doors-container {
      position: absolute;
      bottom: 20%; left: 50%;
      transform: translateX(-50%);
      width: 36%; height: 44%;
      display: flex; overflow: hidden;
      z-index: 5;
    }
    .door-left-panel {
      width: 50%; height: 100%;
      background: linear-gradient(135deg, #8B5E3C, #6B3A1F);
      transform-origin: left center;
      transition: transform 2s cubic-bezier(0.4,0,0.2,1);
    }
    .door-right-panel {
      width: 50%; height: 100%;
      background: linear-gradient(225deg, #8B5E3C, #6B3A1F);
      transform-origin: right center;
      transition: transform 2s cubic-bezier(0.4,0,0.2,1);
    }
    .door-left-panel.open { transform: translateX(-100%); }
    .door-right-panel.open { transform: translateX(100%); }
    .glow-inside {
      position: absolute;
      bottom: 20%; left: 50%;
      transform: translateX(-50%);
      width: 36%; height: 44%;
      background: radial-gradient(ellipse at center, rgba(255,180,80,0.95) 0%, rgba(255,140,50,0.6) 40%, transparent 70%);
      opacity: 0; transition: opacity 1s ease;
      pointer-events: none; z-index: 4;
    }
    .glow-inside.show { opacity: 1; }
    .cafe-name-overlay {
      position: absolute;
      top: 10%; left: 50%;
      transform: translateX(-50%);
      font-family: 'Georgia', serif;
      font-size: 26px; font-weight: bold;
      color: #C9A84C;
      text-shadow: 0 0 15px rgba(201,168,76,0.9);
      letter-spacing: 4px; z-index: 10;
      white-space: nowrap;
    }
    .enter-btn {
      position: absolute;
      bottom: 8%; left: 50%;
      transform: translateX(-50%);
      background: rgba(201,168,76,0.15);
      border: 2px solid #C9A84C;
      color: #C9A84C;
      padding: 12px 36px;
      font-size: 14px; font-weight: 600;
      letter-spacing: 3px; border-radius: 4px;
      cursor: pointer; z-index: 20;
      animation: pulse-enter 2s ease-in-out infinite;
    }
    @keyframes pulse-enter {
      0%,100% { box-shadow: 0 0 10px rgba(201,168,76,0.3); }
      50% { box-shadow: 0 0 25px rgba(201,168,76,0.8); }
    }
    #fade-overlay {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #000; opacity: 0;
      z-index: 200; pointer-events: none;
      transition: opacity 0.8s ease;
    }
    #fade-overlay.fade { opacity: 1; }
    #welcome-screen {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #1a0a00;
      display: none; z-index: 1;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    #welcome-screen.show { display: flex; }
    #welcome-screen h1 {
      font-family: 'Georgia', serif;
      color: #C9A84C; font-size: 32px;
      letter-spacing: 6px;
      text-shadow: 0 0 20px rgba(201,168,76,0.8);
    }
    #welcome-screen p {
      color: rgba(255,255,255,0.6);
      font-size: 14px; letter-spacing: 2px;
    }
  </style>
</head>
<body>

<div id="fade-overlay"></div>

<div id="door-scene">
  <img class="bg-image" src="https://raw.githubusercontent.com/7flashybro-code/menuarv2/main/newdoor.png" alt="Cafe">
  <div class="glow-inside" id="glow"></div>
  <div class="doors-container">
    <div class="door-left-panel" id="door-left"></div>
    <div class="door-right-panel" id="door-right"></div>
  </div>
  <div class="cafe-name-overlay">✦ XYZ ✦</div>
  <button class="enter-btn" onclick="startAnimation()">ENTER</button>
</div>

<div id="welcome-screen">
  <h1>✦ XYZ ✦</h1>
  <p>WELCOME TO OUR MENU</p>
</div>

<script>
function startAnimation() {
  document.querySelector('.enter-btn').style.display = 'none';
  document.getElementById('glow').classList.add('show');
  setTimeout(() => {
    document.getElementById('door-left').classList.add('open');
    document.getElementById('door-right').classList.add('open');
  }, 600);
  setTimeout(() => {
    document.getElementById('fade-overlay').classList.add('fade');
  }, 2800);
  setTimeout(() => {
    document.getElementById('door-scene').style.display = 'none';
    document.getElementById('welcome-screen').classList.add('show');
    document.getElementById('fade-overlay').classList.remove('fade');
  }, 3600);
}
</script>
</body>
</html>
```
